version: '3.8'

services:
  app:
    container_name: Mushborg.v1
    build: . # Fa il build del Dockerfile nella stessa cartella
    ports: # Porta di reindirizzamento 3006= riferimento del localhost per aggiungere l'app
      - "3006:3000"
    env_file:
      - .env                  # 1. Carica tutte le variabili dal file locale (.env)
    environment:
      - HOST=mariadb          # 2. SOVRASCRIVE SOLO L'HOST: dice a Docker di usare il container mariadb
    volumes:
    # Usa il volume logico per mappare la cartella interna del container
      - mushborg_images:/app/public/imgMushEleNote   
    depends_on: # Attiva la dipendenza dal contanier mariaDb
      - mariadb

#Definisco il container di maria db
  mariadb: # Nome del container
    build: ./mariadb    # <-- Cambia da "image:" a "build:"
    environment:
      - MYSQL_ROOT_PASSWORD=mushborg0x0
      - MYSQL_DATABASE=mushborg
      - MYSQL_USER=mushborg
      - MYSQL_PASSWORD=mushborg0x0
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      
volumes: #Monta la risorsa sul disco fisso
  mariadb_data:
  mushborg_images: # <-- Docker gestirà questo spazio in modo nativo su qualsiasi OS